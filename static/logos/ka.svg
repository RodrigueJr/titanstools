<svg width="560" height="200" viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=Inter:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Badge shadow -->
  <rect x="6" y="8" width="160" height="160" rx="32" fill="#c9101f" opacity="0.15"/>

  <!-- Badge -->
  <rect x="2" y="2" width="160" height="160" rx="32" fill="#e8192c"/>

  <!-- Highlight -->
  <rect x="2" y="2" width="160" height="52" rx="32" fill="white" opacity="0.07"/>

  <!-- K — vertical stem -->
  <rect x="44" y="38" width="18" height="88" rx="5" fill="white"/>

  <!-- K — top arm -->
  <polygon points="62,82  110,38  130,38  130,52  72,90" fill="white"/>

  <!-- K — bottom arm -->
  <polygon points="62,90  128,134  110,134  62,98" fill="white"/>

  <!-- Accent slash -->
  <rect x="94" y="32" width="38" height="9" rx="4.5" fill="white" opacity="0.4" transform="rotate(-40 94 32)"/>

  <!-- Dot accent -->
  <circle cx="138" cy="140" r="6" fill="white" opacity="0.28"/>

  <!-- Wordmark -->
  <text x="186" y="100" font-family="'Syne', 'Arial Black', sans-serif" font-size="54" font-weight="800" fill="#111318" letter-spacing="-1.5">KYOJIN</text>
  <text x="189" y="130" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="300" fill="#8a8f9a" letter-spacing="7">ACADÉMIE</text>

  <!-- Separator -->
  <line x1="188" y1="142" x2="555" y2="142" stroke="#e4e6ea" stroke-width="1"/>

  <!-- Tagline -->
  <text x="189" y="160" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="400" fill="#adb2bd" letter-spacing="0.8">Formations CGP &amp; Patrimoine</text>
</svg>
