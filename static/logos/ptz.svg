<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé de fond -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d2a3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond circulaire avec dégradé -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- Cercle intérieur blanc -->
  <circle cx="100" cy="100" r="75" fill="white" opacity="0.95"/>
  
  <!-- Maison stylisée -->
  <g filter="url(#shadow)">
    <!-- Toit -->
    <path d="M 100 45 L 65 75 L 135 75 Z" fill="url(#houseGradient)" stroke="#667eea" stroke-width="2"/>
    
    <!-- Corps de la maison -->
    <rect x="70" y="75" width="60" height="50" fill="url(#houseGradient)" stroke="#667eea" stroke-width="2" rx="2"/>
    
    <!-- Porte -->
    <rect x="85" y="95" width="15" height="30" fill="#667eea" rx="1"/>
    
    <!-- Fenêtre -->
    <rect x="105" y="85" width="18" height="15" fill="#ffd700" stroke="#667eea" stroke-width="1.5" rx="1"/>
    <line x1="114" y1="85" x2="114" y2="100" stroke="#667eea" stroke-width="1"/>
    <line x1="105" y1="92.5" x2="123" y2="92.5" stroke="#667eea" stroke-width="1"/>
    
    <!-- Cheminée -->
    <rect x="115" y="55" width="8" height="20" fill="#667eea"/>
  </g>
  
  <!-- Graphique montant (barres) -->
  <g transform="translate(50, 135)">
    <!-- Barre 1 -->
    <rect x="5" y="15" width="12" height="25" fill="url(#chartGradient)" rx="2"/>
    <!-- Barre 2 -->
    <rect x="22" y="8" width="12" height="32" fill="url(#chartGradient)" rx="2"/>
    <!-- Barre 3 -->
    <rect x="39" y="0" width="12" height="40" fill="url(#chartGradient)" rx="2"/>
    
    <!-- Ligne de tendance -->
    <path d="M 11 27 L 28 20 L 45 12" stroke="#00b894" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="11" cy="27" r="3" fill="#00b894"/>
    <circle cx="28" cy="20" r="3" fill="#00b894"/>
    <circle cx="45" cy="12" r="3" fill="#00b894"/>
  </g>
  
  <!-- Symbole € stylisé -->
  <g transform="translate(130, 140)">
    <circle cx="15" cy="20" r="14" fill="none" stroke="#764ba2" stroke-width="2.5"/>
    <path d="M 10 20 L 20 20 M 10 16 L 20 16" stroke="#764ba2" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 18 12 Q 12 12 12 20 Q 12 28 18 28" stroke="none" fill="#764ba2"/>
  </g>
  
  <!-- Texte "SC" (Simulateur Crédit) -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">SIMULATEUR</text>
  <text x="100" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#764ba2" text-anchor="middle">CRÉDIT</text>
</svg>
